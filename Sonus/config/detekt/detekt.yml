style:
  ForbiddenComment:
    active: true
  UnusedImports:
    active: true
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotated: ['Composable', 'Preview']
  NewLineAtEndOfFile:
    active: true
naming:
  ClassNaming:
    classPattern: '[A-Z][A-Za-z0-9]*'
  FunctionNaming:
    functionPattern: '[a-z][A-Za-z0-9]*'
    ignoreAnnotated: ['Composable']
    excludes: ['**/test/**', '**/androidTest/**']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'
exceptions:
  TooGenericExceptionCaught:
    active: true
  SwallowedException:
    active: true
    # SAF permission denial is translated to a value (Boolean), not propagated (principle P1,
    # interfaces_contract §3.0). Catching SecurityException at the data edge is intentional.
    ignoredExceptionTypes:
      - InterruptedException
      - MalformedURLException
      - NumberFormatException
      - ParseException
      - SecurityException
